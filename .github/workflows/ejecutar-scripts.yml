name: Ejecutar Scripts del Servidor Git desde CSV

on:
  workflow_dispatch:

jobs:
  ejecutar-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.GIT_SERVER_SSH_KEY }}

      - name: Ejecutar scripts remotos
        run: |
          set -euo pipefail

          ############################################
          # Configuración
          ############################################

          CSV_FILE="repos.csv"
          SSH_USER="${{ secrets.GIT_SERVER_USER }}"
          SSH_HOST="${{ secrets.GIT_SERVER_HOST }}"
          SSH_PORT="${{ secrets.GIT_SERVER_PORT:-22 }}"
          REMOTE_SCRIPTS_DIR="/opt/scripts"

          if [ ! -f "$CSV_FILE" ]; then
            echo "❌ No se encontró el archivo $CSV_FILE"
            exit 1
          fi

          ############################################
          # Ejecutar procesamiento remoto
          ############################################

          echo "## 📊 Resumen de ejecución" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Repo OnPrem | Repo GHE | Resultado |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|----------|-----------|" >> $GITHUB_STEP_SUMMARY

          ssh -o StrictHostKeyChecking=no \
              -p "$SSH_PORT" \
              "${SSH_USER}@${SSH_HOST}" << 'EOF' > resultados.txt

            set -euo pipefail

            RUTA_SCRIPTS="/opt/scripts"
            fallos=0

            ############################################
            # Validar scripts
            ############################################

            for script in \
              "$RUTA_SCRIPTS/01.obtenerRamasActivas.sh" \
              "$RUTA_SCRIPTS/02.deshabilitarRamasCode.sh" \
              "$RUTA_SCRIPTS/03.deshabiltarJobs.sh"
            do
              if [ ! -x "$script" ]; then
                echo "❌ Script faltante o sin permisos: $script" >&2
                exit 1
              fi
            done

            echo "✅ Scripts validados correctamente" >&2
            echo "🚀 Iniciando procesamiento..." >&2

            ############################################
            # Procesar CSV
            ############################################

            while IFS="," read -r repo_onprem repo_ghe || [ -n "$repo_onprem" ]
            do
              [ -z "$repo_onprem" ] && continue

              repo_onprem=$(echo "$repo_onprem" | xargs)
              repo_ghe=$(echo "$repo_ghe" | xargs)

              echo "--------------------------------" >&2
              echo "Procesando: $repo_onprem" >&2

              "$RUTA_SCRIPTS/01.obtenerRamasActivas.sh" "$repo_onprem"
              r1=$?

              "$RUTA_SCRIPTS/02.deshabilitarRamasCode.sh" "$repo_onprem" "$repo_ghe"
              r2=$?

              "$RUTA_SCRIPTS/03.deshabiltarJobs.sh" "$repo_onprem" "$repo_ghe"
              r3=$?

              if [ $r1 -eq 0 ] && [ $r2 -eq 0 ] && [ $r3 -eq 0 ]; then
                echo "$repo_onprem,$repo_ghe,EXITO"
              else
                echo "$repo_onprem,$repo_ghe,FALLO"
                fallos=$((fallos+1))
              fi

            done < /workspace/repos.csv

            echo "TOTAL_FALLOS=$fallos"

EOF

          ############################################
          # Procesar resultados y construir tabla
          ############################################

          TOTAL_FALLOS=0

          while IFS=',' read -r repo_onprem repo_ghe resultado
          do
            if [[ "$repo_onprem" == TOTAL_FALLOS=* ]]; then
              TOTAL_FALLOS="${repo_onprem#*=}"
              continue
            fi

            if [ "$resultado" == "EXITO" ]; then
              echo "| $repo_onprem | $repo_ghe | ✅ ÉXITO |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $repo_onprem | $repo_ghe | ❌ FALLÓ |" >> $GITHUB_STEP_SUMMARY
            fi

          done < resultados.txt

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$TOTAL_FALLOS" -gt 0 ]; then
            echo "❌ $TOTAL_FALLOS repositorios presentaron errores." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ Todos los repositorios fueron procesados correctamente." >> $GITHUB_STEP_SUMMARY
          fi
