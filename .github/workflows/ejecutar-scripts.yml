name: Ejecutar Scripts del Servidor Git desde CSV

on:
  workflow_dispatch:

jobs:
  ejecutar-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.GIT_SERVER_SSH_KEY }}

      - name: Ejecutar scripts y generar resumen
        run: |
          set -e
          ARCHIVO="repos.csv"

          if [ ! -f "$ARCHIVO" ]; then
            echo "❌ No se encontró el archivo $ARCHIVO"
            exit 1
          fi

          PUERTO_SSH=${{ secrets.GIT_SERVER_PORT }}
          PUERTO_SSH=${PUERTO_SSH:-22}

          echo "## 📊 Resumen de ejecución" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Repo OnPrem | Repo GHE | Resultado |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|----------|-----------|" >> $GITHUB_STEP_SUMMARY

          cat "$ARCHIVO" | ssh -o StrictHostKeyChecking=no \
              -p $PUERTO_SSH \
              ${{ secrets.GIT_SERVER_USER }}@${{ secrets.GIT_SERVER_HOST }} '

            RUTA_SCRIPTS="/opt/scripts"
            fallos=0

            echo "🚀 Iniciando procesamiento remoto..."
            echo "📂 Ruta de scripts: $RUTA_SCRIPTS"

            while IFS="," read -r repo_onprem repo_ghe || [ -n "$repo_onprem" ]
            do
              [ -z "$repo_onprem" ] && continue

              repo_onprem=$(echo "$repo_onprem" | xargs)
              repo_ghe=$(echo "$repo_ghe" | xargs)

              echo "--------------------------------------"
              echo "Procesando: $repo_onprem"
              echo "--------------------------------------"

              "$RUTA_SCRIPTS/01.obtenerRamasActivas.sh" "$repo_onprem" "$repo_ghe"
              r1=$?

              "$RUTA_SCRIPTS/02.deshabilitarRamasCode" "$repo_onprem" "$repo_ghe"
              r2=$?

              "$RUTA_SCRIPTS/03.deshabiltarJobs" "$repo_onprem" "$repo_ghe"
              r3=$?

              if [ $r1 -eq 0 ] && [ $r2 -eq 0 ] && [ $r3 -eq 0 ]; then
                echo "$repo_onprem,$repo_ghe,EXITO"
              else
                echo "$repo_onprem,$repo_ghe,FALLO"
                fallos=$((fallos+1))
              fi

            done

            echo "TOTAL_FALLOS=$fallos"
            echo "🏁 Procesamiento remoto finalizado."
            exit 0
          ' > resultados.txt

          TOTAL_FALLOS=0

          while IFS=',' read -r repo_onprem repo_ghe resultado
          do
            if [[ "$repo_onprem" == TOTAL_FALLOS* ]]; then
              TOTAL_FALLOS=$(echo "$repo_onprem" | cut -d'=' -f2)
              continue
            fi

            if [ "$resultado" == "EXITO" ]; then
              echo "| $repo_onprem | $repo_ghe | ✅ ÉXITO |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $repo_onprem | $repo_ghe | ❌ FALLÓ |" >> $GITHUB_STEP_SUMMARY
            fi
          done < resultados.txt

          if [ "$TOTAL_FALLOS" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ $TOTAL_FALLOS repositorio(s) presentaron errores." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Todos los repositorios fueron procesados correctamente." >> $GITHUB_STEP_SUMMARY
          fi
