name: Ejecutar Scripts del Servidor Git desde CSV

on:
  workflow_dispatch:

jobs:
  ejecutar-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.GIT_SERVER_SSH_KEY }}

      - name: Ejecutar scripts remotos
        run: |
          set -euo pipefail

          ARCHIVO="repos.csv"

          if [ ! -f "$ARCHIVO" ]; then
            echo "::error::No se encontró el archivo $ARCHIVO"
            exit 1
          fi

          SSH_PORT=${{ secrets.GIT_SERVER_PORT }}
          SSH_PORT=${SSH_PORT:-22}

          HOST="${{ secrets.GIT_SERVER_HOST }}"
          USER="${{ secrets.GIT_SERVER_USER }}"

          echo "::notice::Iniciando ejecución remota"

          echo "## 📊 Resumen de ejecución" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Repo OnPrem | Repo GHE | Resultado |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|----------|-----------|" >> $GITHUB_STEP_SUMMARY

          TOTAL_FALLOS=0

          while IFS=',' read -r repo_onprem repo_ghe || [ -n "$repo_onprem" ]
          do
            repo_onprem=$(echo "$repo_onprem" | xargs)
            repo_ghe=$(echo "$repo_ghe" | xargs)

            [ -z "$repo_onprem" ] && continue

            echo "::group::Procesando $repo_onprem"

            RESULT=$(ssh -o StrictHostKeyChecking=no \
              -p $SSH_PORT \
              $USER@$HOST \
              "bash -s" <<EOF

            set -e

            RUTA_SCRIPTS="/opt/scripts"

            echo "::notice::Validando scripts"

            for script in \
              "\$RUTA_SCRIPTS/01.obtenerRamasActivas.sh" \
              "\$RUTA_SCRIPTS/02.deshabilitarRamasCode.sh" \
              "\$RUTA_SCRIPTS/03.deshabiltarJobs.sh"
            do
              if [ ! -x "\$script" ]; then
                echo "::error::Script faltante: \$script"
                exit 2
              fi
            done

            echo "::notice::Ejecutando scripts para $repo_onprem"

            "\$RUTA_SCRIPTS/01.obtenerRamasActivas.sh" "$repo_onprem"
            r1=\$?

            "\$RUTA_SCRIPTS/02.deshabilitarRamasCode.sh" "$repo_onprem" "$repo_ghe"
            r2=\$?

            "\$RUTA_SCRIPTS/03.deshabiltarJobs.sh" "$repo_onprem" "$repo_ghe"
            r3=\$?

            if [ \$r1 -eq 0 ] && [ \$r2 -eq 0 ] && [ \$r3 -eq 0 ]; then
              echo "RESULT=EXITO"
            else
              echo "RESULT=FALLO"
            fi

            EOF
            )

            if echo "$RESULT" | grep -q "RESULT=EXITO"; then
              echo "::notice::$repo_onprem completado correctamente"
              echo "| $repo_onprem | $repo_ghe | ✅ ÉXITO |" >> $GITHUB_STEP_SUMMARY
            else
              echo "::error::Fallo en $repo_onprem"
              echo "| $repo_onprem | $repo_ghe | ❌ FALLÓ |" >> $GITHUB_STEP_SUMMARY
              TOTAL_FALLOS=$((TOTAL_FALLOS+1))
            fi

            echo "::endgroup::"

          done < "$ARCHIVO"

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$TOTAL_FALLOS" -gt 0 ]; then
            echo "❌ $TOTAL_FALLOS repositorio(s) presentaron errores." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ Todos los repositorios fueron procesados correctamente." >> $GITHUB_STEP_SUMMARY
          fi
